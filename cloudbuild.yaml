steps:
  # Safety check: detect banned Drizzle patterns before building
  - name: 'bash'
    args: ['scripts/lint-drizzle.sh']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'apps/api/Dockerfile'
      - '-t'
      - '$_IMAGE_TAG'
      - '.'
images:
  - '$_IMAGE_TAG'
timeout: '1200s'
options:
  machineType: 'E2_HIGHCPU_8'
