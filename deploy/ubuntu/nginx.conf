# Sigil CMS — nginx reverse proxy configuration
# Serves: Admin SPA (static), API (proxy), Renderer (proxy)
#
# After installing, enable HTTPS:
#   sudo certbot --nginx -d your-domain.com

upstream sigil_api {
    server 127.0.0.1:3001;
    keepalive 8;
}

upstream sigil_renderer {
    server 127.0.0.1:4000;
    keepalive 4;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size for media
    client_max_body_size 50M;

    # API — all /api/ and /health requests
    location /api/ {
        proxy_pass http://sigil_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /health {
        proxy_pass http://sigil_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Renderer — public-facing site pages at /site/
    # To serve at root instead, swap the / and /site/ location blocks.
    location /site/ {
        rewrite ^/site/(.*) /$1 break;
        proxy_pass http://sigil_renderer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Admin SPA — served from built static files
    location / {
        root /opt/sigil/apps/admin/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching (hashed filenames from Vite)
    location /assets/ {
        root /opt/sigil/apps/admin/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
