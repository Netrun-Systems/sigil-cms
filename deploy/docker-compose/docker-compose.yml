version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sigil
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sigil_dev_password}
      POSTGRES_DB: sigil
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigil"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sigil-api:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://sigil:${DB_PASSWORD:-sigil_dev_password}@postgres:5432/sigil
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SEED_API_KEY=${SEED_API_KEY:-sigil-bootstrap}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
    ports:
      - "${API_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  sigil-admin:
    build:
      context: ../..
      dockerfile: Dockerfile.admin
    ports:
      - "${ADMIN_PORT:-3000}:8080"
    environment:
      - VITE_API_URL=http://localhost:${API_PORT:-3001}
    depends_on:
      - sigil-api
    restart: unless-stopped

  sigil-renderer:
    build:
      context: ../../apps/renderer
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - API_URL=http://sigil-api:3000/api/v1/public
      - SITE_SLUG=${SITE_SLUG:-default}
      - SITE_NAME=${SITE_NAME:-My Site}
    ports:
      - "${RENDERER_PORT:-4000}:3000"
    depends_on:
      - sigil-api
    restart: unless-stopped

volumes:
  pgdata:
